<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mama Grace Shoes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f8f8f8;
    }header {
  background: #222;
  color: white;
  padding: 15px;
  text-align: center;
}

nav {
  display: flex;
  justify-content: center;
  background: #444;
}

nav a {
  color: white;
  padding: 10px 20px;
  text-decoration: none;
}

nav a:hover {
  background: #666;
}

.hero {
  text-align: center;
  padding: 50px;
  background: #ddd;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  text-align: center;
}

.product img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;
}

.contact {
  padding: 20px;
  background: #eee;
  text-align: center;
}

footer {
  text-align: center;
  padding: 10px;
  background: #222;
  color: white;
}

  </style>
</head>
<body><header>
  <h1>Mama Grace Shoes</h1>
  <p>Quality Shoes for Everyone</p>
</header><nav>
  <a href="#">Home</a>
  <a href="#products">Products</a>
  <a href="#contact">Contact</a>
</nav><section class="hero">
  <h2>Welcome to Mama Grace Shoes</h2>
  <p>Affordable and stylish footwear in Kampala</p>
</section><section id="products" class="products">
  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Sneakers">
    <h3>Sneakers</h3>
    <p>UGX 80,000</p>
  </div>  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Heels">
    <h3>Heels</h3>
    <p>UGX 60,000</p>
  </div>  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Sandals">
    <h3>Sandals</h3>
    <p>UGX 40,000</p>
  </div>
</section><section id="contact" class="contact">
  <h2>Contact Mama Grace</h2>
  <p>Phone: +256 700 000000</p>
  <p>Location: Kampala, Uganda</p>
</section><footer>
  <p>&copy; 2026 Mama Grace Shoes</p>
</footer></body>
</html>
